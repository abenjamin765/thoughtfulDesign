id: "10-ai-in-modern-ux"
title: "Module 10 Assessment — AI in Modern UX"
type: module
covers: ["10-ai-in-modern-ux"]
pass_threshold: 0.8
scenario: "ai-assistant"

questions:
  - id: q1
    type: multiple_choice
    difficulty: early
    stem: "An AI tool returns a polished research summary instantly. Why treat it with caution?"
    options:
      - text: "Fluent, confident output can still be incomplete, generic, or unsupported."
        correct: true
        feedback: "Correct. Polish is not accuracy; verify before relying on it."
      - text: "AI output is always wrong."
        correct: false
        feedback: "Too absolute — it can be useful, but needs checking."
      - text: "No caution is needed if it looks professional."
        correct: false
        feedback: "Looks are exactly what hide errors."

  - id: q2
    type: multiple_choice
    difficulty: early
    stem: "When using AI, what remains the designer's responsibility?"
    options:
      - text: "Judgment — deciding what's true, what matters, and what to do."
        correct: true
        feedback: "Correct. Accountability does not transfer to the tool."
      - text: "Nothing; the AI is accountable."
        correct: false
        feedback: "Responsibility stays with the human."
      - text: "Only visual styling."
        correct: false
        feedback: "Judgment is the core responsibility."

  - id: q3
    type: multiple_choice
    difficulty: mid
    stem: "Which UX task suits AI as a first-draft tool?"
    options:
      - text: "Deciding which feature to build."
        correct: false
        feedback: "A judgment call for humans."
      - text: "Generating first-pass clusters from notes for a human to verify."
        correct: true
        feedback: "Correct. Fast draft plus human check."
      - text: "Approving a final design with no review."
        correct: false
        feedback: "Removes the human checkpoint where it matters."

  - id: q4
    type: multiple_choice
    difficulty: mid
    stem: "When AI is a 'design material' in a feature, what new problem appears?"
    options:
      - text: "How to communicate uncertainty, sources, and error recovery to users."
        correct: true
        feedback: "Correct. User-facing AI raises trust and recovery questions."
      - text: "Only which font to use."
        correct: false
        feedback: "Far more than styling is at stake."
      - text: "Nothing new."
        correct: false
        feedback: "User-facing AI raises genuinely new design problems."

  - id: q5
    type: multiple_choice
    difficulty: mid
    stem: "What should a user know before trusting an AI recommendation?"
    options:
      - text: "How confident the system is, what it's based on, and how to undo it."
        correct: true
        feedback: "Correct. These let users calibrate trust."
      - text: "Only that it was generated by AI."
        correct: false
        feedback: "A bare label is not enough."
      - text: "Nothing; trust should be automatic."
        correct: false
        feedback: "Automatic trust is the central risk."

  - id: q6
    type: multiple_choice
    difficulty: late
    stem: "Where should a human checkpoint stay in an AI feature?"
    options:
      - text: "Where an error would be costly, hard to reverse, or harmful to others."
        correct: true
        feedback: "Correct. Place oversight where the stakes are highest."
      - text: "Nowhere — full automation is the goal."
        correct: false
        feedback: "Removes the safeguard where it matters most."
      - text: "Everywhere, reviewing every token."
        correct: false
        feedback: "Impractical and defeats the benefit."

  - id: q7
    type: true_false
    difficulty: early
    stem: "True or false: Choosing not to add AI to a feature can be a thoughtful design decision."
    options:
      - text: "True"
        correct: true
        feedback: "Correct. Restraint is part of judgment when stakes are high or AI is unreliable."
      - text: "False"
        correct: false
        feedback: "Not using AI is a legitimate, sometimes wise, choice."

  - id: q8
    type: judgment
    difficulty: late
    no_single_correct: true
    stem: "The AI writing assistant could auto-send suggested replies to save users time, but it occasionally produces wrong or biased text. What do you design?"
    options:
      - text: "Suggest inline, require a one-tap human approve before anything sends."
        rationale: "Keeps the speed benefit while preserving control at the costly, irreversible moment. Risk: slightly less 'magic' and one more tap."
      - text: "Auto-send but make it easy to recall a message within 30 seconds."
        rationale: "Maximizes speed with a recovery window. Risk: some errors are seen or acted on before recall, and harm may already be done."
      - text: "Auto-send only low-stakes replies, require approval for sensitive ones."
        rationale: "Tunes oversight to stakes. Risk: classifying 'sensitive' reliably is itself hard and can fail."
    synthesis: "All are defensible. The strongest answers keep humans in the loop at the highest-stakes, least-reversible point and design honest confidence and recovery — rather than optimizing the checkpoint away for speed."
