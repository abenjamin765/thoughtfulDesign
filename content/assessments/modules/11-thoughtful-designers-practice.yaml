id: "11-thoughtful-designers-practice"
title: "Module 11 Assessment — The Thoughtful Designer's Practice"
type: module
covers: ["11-thoughtful-designers-practice"]
pass_threshold: 0.8
scenario: "ai-assistant"

questions:
  - id: q1
    type: multiple_choice
    difficulty: early
    stem: "A designer knows every method but freezes under ambiguity and pressure. What's missing?"
    options:
      - text: "More methods and tools."
        correct: false
        feedback: "Methods are necessary but not sufficient."
      - text: "Practiced judgment applied in messy, real conditions."
        correct: true
        feedback: "Correct. Thoughtful design is practiced judgment, not more frameworks."
      - text: "A faster computer."
        correct: false
        feedback: "Tools are not the gap."

  - id: q2
    type: multiple_choice
    difficulty: mid
    stem: "Which update communicates design rationale most clearly?"
    options:
      - text: "'Made the AI suggestions look cleaner.'"
        correct: false
        feedback: "Reports activity without reasoning."
      - text: "'Moved suggestions behind a one-tap approve because auto-send caused costly errors; trades a little speed for trust.'"
        correct: true
        feedback: "Correct. Names the change, reason, and tradeoff."
      - text: "'Improved the AI feature.'"
        correct: false
        feedback: "No reasoning to evaluate."

  - id: q3
    type: multiple_choice
    difficulty: mid
    stem: "When should a designer push for more evidence rather than proceed?"
    options:
      - text: "When the decision is high-impact and rests on a risky, untested assumption."
        correct: true
        feedback: "Correct. Match the push to stakes and uncertainty."
      - text: "Always, before any decision."
        correct: false
        feedback: "That stalls all work."
      - text: "Never; speed is all that matters."
        correct: false
        feedback: "Reckless on high-stakes bets."

  - id: q4
    type: multiple_choice
    difficulty: mid
    stem: "What makes a decision record useful later?"
    options:
      - text: "It captures the decision, reasoning, tradeoffs, and a revisit trigger."
        correct: true
        feedback: "Correct. It preserves the *why*, not just the *what*."
      - text: "It lists meeting attendees."
        correct: false
        feedback: "Attendance doesn't carry reasoning forward."
      - text: "It records only the final choice."
        correct: false
        feedback: "Without the why, it's nearly useless later."

  - id: q5
    type: multiple_choice
    difficulty: late
    stem: "How does the Thoughtful Design Loop help with unfamiliar problems?"
    options:
      - text: "It offers reusable questions that work even when specifics are new."
        correct: true
        feedback: "Correct. The seven questions travel to any problem."
      - text: "It only works for this course's scenarios."
        correct: false
        feedback: "It is deliberately portable."
      - text: "It removes the need for judgment."
        correct: false
        feedback: "It structures judgment, not replaces it."

  - id: q6
    type: multiple_choice
    difficulty: mid
    stem: "Which best describes a mature thoughtful design practice?"
    options:
      - text: "Adapting the loop and methods to the situation, plus reflection that compounds judgment."
        correct: true
        feedback: "Correct. Fluent, situation-aware use, plus learning over time."
      - text: "Applying a fixed checklist identically every time."
        correct: false
        feedback: "Rigid application ignores context."
      - text: "Relying on instinct and skipping methods."
        correct: false
        feedback: "Method-free instinct is not maturity."

  - id: q7
    type: true_false
    difficulty: early
    stem: "True or false: A decision should record only the option chosen, not the reasoning behind it."
    options:
      - text: "True"
        correct: false
        feedback: "False. The reasoning is what makes the record useful when context is forgotten."
      - text: "False"
        correct: true
        feedback: "Correct. Capture the why and the tradeoff, not just the choice."

  - id: q8
    type: judgment
    difficulty: late
    no_single_correct: true
    stem: "A complex situation lands: unclear objects, thin evidence, stakeholder disagreement, and an AI feature with quality risks, all under a deadline. What's your first move?"
    options:
      - text: "Run the loop quickly — model what exists and understand who's affected — before proposing a solution."
        rationale: "Grounds the work before shaping, even at speed. Risk: stakeholders impatient for a solution may read it as slow."
      - text: "Frame the single most important decision and align the team on it first."
        rationale: "Cuts through disagreement by focusing the group. Risk: deciding before enough is understood can repeat the course's opening mistake."
      - text: "Name the riskiest assumption and get the cheapest possible evidence on it."
        rationale: "Reduces the biggest uncertainty fast. Risk: may not address the disagreement or the AI quality issue directly."
    synthesis: "All are defensible thoughtful starts. The strongest answers begin from understanding rather than solutions, adapt the loop to the time available, and sequence the moves rather than trying to do everything at once."
